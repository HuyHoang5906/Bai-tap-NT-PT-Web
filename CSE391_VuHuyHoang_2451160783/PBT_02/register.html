<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
</head>
<body>
    <h1>Đăng ký tài khoản</h1>
    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <label for="fullname">Họ tên:</label>
            <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập họ tên">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@gmail.com">
            <br><br>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0901234567" required>
            <br><br>

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-04-29" required>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" pattern="[A-Za-z0-9_]{3,20}" required placeholder="Chữ, số, gạch dưới">
            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" required placeholder="8 ký tự, 1 hoa, 1 số">
            <br><br>

            <label for="confirm_pass">Xác nhận password:</label>
            <input type="password" id="confirm_pass" name="confirm_pass" minlength="8" pattern="(?=.*\d)(?=.*[A-Z]).{8,}" required placeholder="Nhập lại mật khẩu">
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label>
            <select id="city" name="city" required>
                <option value="">-- Chọn thành phố --</option>
                <option value="HN">Hà Nội</option>
                <option value="HCM">TP. Hồ Chí Minh</option>
                <option value="TH">Thanh Hóa</option>
                <option value="HP">Hải Phòng</option>
                <option value="BL">Bắc Linh</option>
            </select>
            <br><br>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district" required>
                <option value="">-- Chọn quận huyện --</option>
                <option value="YD">Huyện Yên Định</option>
                <option value="HM">Quận Hoàng Mai</option>
                <option value="HBT">Quận Hai Bà Trưng</option>
                <option value="HK">Quận Hoàn Kiếm</option>
            </select>
            <br><br>

            <label for="address">Địa chỉ chi tiết:</label><br>
            <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..." required></textarea>
            <br><br>

            <label>Giới tính:</label>
            <input type="radio" id="male" name="gender" value="Nam" required>
            <label for="male">Nam</label>
            <input type="radio" id="female" name="gender" value="Nữ">
            <label for="female">Nữ</label>
            <input type="radio" id="other" name="gender" value="Khác">
            <label for="other">Khác</label>
        </fieldset>

        <br>
        <input type="checkbox" id="agree" name="agree" required>
        <label for="agree">Tôi đồng ý với điều khoản dịch vụ</label>
        <br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Làm lại</button>
    </form>
</body>
</html>
